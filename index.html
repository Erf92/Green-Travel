<!DOCTYPE html>
<html dir="rtl" lang="fa">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>سفر سبز</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div class="container">
        <div class="header-content">
          <a href="/" class="header__logo">سفر سبز</a>
          <nav class="header__nav">
            <ul class="nav__menu">
              <li class="menu__item"><a href="#">خانه</a></li>
              <li class="menu__item"><a href="#">تورها</a></li>
              <li class="menu__item"><a href="#">درباره ما</a></li>
              <li class="menu__item"><a href="#">تماس</a></li>
            </ul>
          </nav>
        </div>
      </div>
    </header>
    <main>
      <section class="hero">
        <div class="hero__content">
          <h1 class="hero__title">با سفر سبز، طبیعت را کشف کن</h1>
          <p class="hero__subtitle">تورهای طبیعت‌گردی با کمترین کربن</p>
          <button class="hero__btn">رزرو تور</button>
        </div>
      </section>
      <section class="quick-search">
        <article class="search-card">
          <form class="search__form">
            <div class="form__field">
              <label for="destination">مقصد:</label>
              <input
                type="text"
                name="destination"
                id="destination"
                placeholder="مثلا شمال"
              />
            </div>
            <div class="form__field">
              <label for="travel-date">تاریخ:</label>
              <input type="date" name="travel-date" id="travel-date" />
            </div>
            <div class="form__field">
              <label for="travelers">تعداد مسافران:</label>
              <input
                type="number"
                name="travelers"
                id="travelers"
                min="1"
                placeholder="1"
              />
            </div>
            <button type="submit" class="form__btn" id="formBtn">جستجو</button>
          </form>
        </article>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
